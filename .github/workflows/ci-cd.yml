name: CICD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  get-python-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.python-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get Python version
        id: python-version
        uses: ./.github/actions/get-python-version

  lint-format-test:
    needs: get-python-version
    runs-on: ubuntu-latest
    steps:
      - name: Free up disk space
        run: |
          echo "Initial disk usage:"
          df -h
          docker system prune -af
          echo "After cleanup:"
          df -h

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ needs.get-python-version.outputs.version }}

      - name: Run linter
        run: uv run ruff check src/ tests/

      - name: Run formatter check
        run: uv run ruff format --check src/ tests/

      - name: Run type checker
        run: uv run pyright src/

      - name: Unit Tests with pytest
        run: uv run pytest -v --durations=0 --cov --cov-report=xml

      - name: Upload Coverage to Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  tag-release:
    needs: [lint-format-test, get-python-version]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag_created: ${{ steps.check_tag.outputs.tag_created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ needs.get-python-version.outputs.version }}
          install-dependencies: 'false'

      - name: Get Version
        id: get_version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists, skipping tag creation."
            echo "tag_created=false" >> $GITHUB_OUTPUT
          else
            echo "tag_created=true" >> $GITHUB_OUTPUT
          fi

      - name: Create and push new tag
        if: steps.check_tag.outputs.tag_created == 'true'
        run: |
          git tag -a "v${VERSION}" -m "Release version v${VERSION}"
          git push origin "v${VERSION}"

  publish-dev:
    needs: [lint-format-test, get-python-version]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ needs.get-python-version.outputs.version }}
          install-dependencies: 'false'

      - name: Build package
        shell: bash
        run: uv build

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/
          verbose: true
          skip-existing: true

  publish-main:
    needs: [lint-format-test, get-python-version, tag-release]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.tag-release.outputs.tag_created == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ needs.get-python-version.outputs.version }}
          install-dependencies: 'false'

      - name: Build package
        shell: bash
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          verbose: true
          skip-existing: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          name: Release v${{ needs.tag-release.outputs.version }}
          body: "Automated release for v${{ needs.tag-release.outputs.version }}"
          draft: false
          prerelease: false
          tag_name: v${{ needs.tag-release.outputs.version }}

  smoke-test:
    needs: [publish-main, tag-release, get-python-version]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.tag-release.outputs.tag_created == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ needs.get-python-version.outputs.version }}
          install-dependencies: 'false'

      - name: Wait for package availability
        run: |
          echo "Waiting 90 seconds for package to be available on PyPI..."
          sleep 90

      - name: Test prod package installation
        run: |
          pip install pylmt==${{ needs.tag-release.outputs.version }}

      - name: Basic import test
        run: |
          python -c "import lmt; print('Package import successful')"
